<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas du Graphisme</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="ls">
    <div id="ls-pct">0</div>
    <div id="ls-label">%&nbsp;&nbsp;&nbsp;Chargement des styles</div>
    <div id="ls-nom"></div>
  </div>

  <button id="btn-mute" title="Son ambiant">♫</button>
  <button id="btn-theme" title="Thème">&#9680;</button>
  <div id="cursor"></div>
  <div id="bg-typo"><span></span></div>
  <div id="title">Atlas du Graphisme</div>
  <div id="hint">Drag pour orbiter &nbsp;·&nbsp; Scroll pour zoomer &nbsp;·&nbsp; Clic pour explorer</div>
  <div id="nav-dots"></div>
  <div id="labels"></div>
  <div id="timeline">
    <div id="timeline-years"></div>
    <div id="timeline-line"></div>
    <div id="timeline-dots"></div>
    <div id="timeline-marker"><span id="timeline-marker-year"></span><span id="timeline-marker-nom"></span><div id="tl-tab"><span id="tl-tab-year"></span><span class="tl-tab-sep"> · </span><span id="tl-tab-nom"></span><span id="tl-tab-arrow">↑</span></div></div>
  </div>

  <div id="tl-tooltip">
    <div id="tl-tooltip-inner">
      <button id="tl-tooltip-close" title="Réduire">↓</button>
      <div id="tl-tooltip-scroll"></div>
    </div>
  </div>

  <div id="lightbox">
    <button id="lb-close">&times;</button>
    <button id="lb-prev">&#8249;</button>
    <img id="lb-img" src="" alt="">
    <button id="lb-next">&#8250;</button>
    <div id="lb-counter"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
  import { BokehPass }        from 'three/addons/postprocessing/BokehPass.js';
  import { OutputPass }       from 'three/addons/postprocessing/OutputPass.js';
  import { OrbitControls }    from 'three/addons/controls/OrbitControls.js';
  import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

  // ─────────────────────────────────────────────────────────────────
  // DATA — chargée depuis l'API REST
  // Fallback hardcodé utilisé si l'API est inaccessible
  // ─────────────────────────────────────────────────────────────────

  const FALLBACK_CONTENT = {
    'arts-crafts':    { artistes: ['William Morris','Walter Crane','Charles Voysey'],       principes: "Organic motifs, medieval inspiration, decorative typography, rejection of industry." },
    'art-nouveau':    { artistes: ['Alphonse Mucha','Hector Guimard','Gustav Klimt'],       principes: 'Sinuous lines, floral motifs, soft colours, ornate typography.' },
    'futurisme':      { artistes: ['Umberto Boccioni','Giacomo Balla','Filippo Marinetti'], principes: 'Dynamic diagonals, speed lines, fragmented forms, aggressive typography.' },
    'constructivisme':{ artistes: ['El Lissitzky','Alexander Rodchenko','Varvara Stepanova'],principes: 'Red & black, geometric forms, photomontage, propaganda function.' },
    'de-stijl':       { artistes: ['Piet Mondrian','Theo van Doesburg','Gerrit Rietveld'],  principes: 'Primary colours only, horizontal/vertical lines, reduction to essence.' },
    'bauhaus':        { artistes: ['Herbert Bayer','László Moholy-Nagy','Paul Klee','Wassily Kandinsky'], principes: 'Grid, pure geometry, primary colours, sans-serif, form follows function.' },
    'art-deco':       { artistes: ['A.M. Cassandre','Paul Colin','Erté'],                  principes: 'Geometric luxury, symmetry, bold contrast, streamline shapes, rich materials.' },
    'surrealisme':    { artistes: ['Salvador Dalí','René Magritte','Max Ernst','Man Ray'],  principes: 'Dream imagery, unexpected juxtapositions, automatism, subconscious symbolism.' },
    'style-suisse':   { artistes: ['Josef Müller-Brockmann','Armin Hofmann','Emil Ruder','Max Bill'], principes: 'Mathematical grid, Helvetica, photography, generous whitespace, clear hierarchy.' },
    'pop-art':        { artistes: ['Andy Warhol','Roy Lichtenstein','Richard Hamilton'],    principes: 'Saturated colours, Ben-Day dots, thick outlines, everyday subjects, repetition.' },
    'vernacular':     { artistes: ['Milton Glaser','Seymour Chwast','Push Pin Studios'],    principes: 'Eclectic historical references, illustration, humour, emotional directness.' },
    'psychedelique':  { artistes: ['Wes Wilson','Victor Moscoso','Rick Griffin'],           principes: 'Acid colours, warped type, biomorphic shapes, extreme saturation.' },
    'new-wave-typo':  { artistes: ['Wolfgang Weingart','April Greiman','Dan Friedman'],     principes: 'Type as texture, layering, diagonal compositions, deliberate imperfection.' },
    'pixel-art':      { artistes: ['Shigeru Miyamoto','Paul Robertson','Mark Ferrari'],     principes: 'Pixel grid, limited palette, dithering, intentional aliasing.' },
    'postmodernisme': { artistes: ['Wolfgang Weingart','David Carson','Paula Scher','Neville Brody'], principes: 'Layering, mixed typefaces, grid deconstruction, collage, excess, irony.' },
    'memphis':        { artistes: ['Ettore Sottsass','Nathalie Du Pasquier','George Sowden'],principes: 'Bold patterns, clashing colours, playful geometry, anti-functionalism.' },
    'grunge':         { artistes: ['David Carson','Barry Deck','Ed Fella'],                 principes: 'Distressed type, raw textures, photocopier aesthetic, apparent chaos.' },
    'y2k':            { artistes: ['Designers Republic','Joshua Davis'],                    principes: 'Chrome, gradients, lens flare, translucency, techno-optimism.' },
    'skeuomorphisme': { artistes: ['Susan Kare','Jonathan Ive (pre-iOS 7)'],               principes: 'Realistic textures, drop shadows, bevels, real-world metaphors.' },
    'flat-design':    { artistes: ['Jonathan Ive (Apple)','Material Design — Google'],      principes: 'Flat colours, no shadows, geometric icons, bold sans-serif, generous space.' },
    'vaporwave':      { artistes: ['Macintosh Plus','Saint Pepsi','James Ferraro'],         principes: 'Pastel neons, glitch, Roman busts, retro 3D, nostalgic digital.' },
    'brutalisme-web': { artistes: ['Pascal Deville','Hass & Hahn'],                        principes: 'Raw HTML feel, visible structure, system fonts, uncomfortable contrast.' },
  };

  // mapApiData : ajouter niveau
  function mapApiData(apiData) {
    const courants = apiData.map(c => {
      const fb = FALLBACK_CONTENT[c.slug] || {};
      const debut = c.periode?.debut;
      const fin   = c.periode?.fin;
      const periodeStr = debut
        ? (fin ? `${debut} – ${fin}` : `${debut} – présent`)
        : (fb.periode || '');
      return {
        id:          c.slug,
        nom:         c.nom,
        periode:     periodeStr,
        couleur:     c.da?.couleur   || '#888888',
        typographie: c.da?.typo      || '"Helvetica Neue", sans-serif',
        description: c.description_longue || c.description_courte || fb.description || '',
        mots_cles:   (c.mots_cles?.length ? c.mots_cles : fb.mots_cles) || [],
        artistes:    c.artistes   || [],
        principes:   c.key_points || '',
        images:      c.images || [],
        image:       (c.images || [])[0] || null,
        position:    new THREE.Vector3(c.position.x * 1.8, c.position.y * 1.8, c.position.z * 1.58),
        niveau:      c.niveau || 1,
      };
    });

    const edges = [];
    apiData.forEach(c => {
      (c.relations || []).forEach(r => {
        edges.push({ from: c.slug, to: r.cible });
      });
    });

    return { courants, edges };
  }

  // ─────────────────────────────────────────────────────────────────
  // LOADING SCREEN
  // ─────────────────────────────────────────────────────────────────

  const lsEl    = document.getElementById('ls');
  const lsPctEl = document.getElementById('ls-pct');
  const lsNomEl = document.getElementById('ls-nom');
  let   lsProgress = 0;

  // Appliquer le thème mémorisé au loading screen immédiatement
  if (localStorage.getItem('atlas-theme') === 'dark') lsEl.classList.add('dark');

  function setProgress(pct, nom) {
    lsProgress = Math.min(100, Math.round(pct));
    lsPctEl.textContent = lsProgress;
    if (nom !== undefined) {
      lsNomEl.style.opacity = '0';
      setTimeout(() => { lsNomEl.textContent = nom; lsNomEl.style.opacity = '1'; }, 250);
    }
  }

  function hideLoadingScreen(onDone) {
    setProgress(100);
    setTimeout(() => {
      lsEl.classList.add('hidden');
      setTimeout(() => { lsEl.style.display = 'none'; if (onDone) onDone(); }, 900);
    }, 300);
  }

  // ─── THREE.JS INIT — scène active pendant le loading, nœuds apparaissent au fur et à mesure ───
  const _isDark = localStorage.getItem('atlas-theme') === 'dark';
  const CAM_START      = new THREE.Vector3(0, 35, 18);  // vue haute inclinée, up standard
  const CAM_END        = new THREE.Vector3(6.75, 5.25, 24.75);
  const CAM_LOOK_START = new THREE.Vector3(0, 0, -4.5);
  const CAM_TRANS_DUR  = 2.0;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.NoToneMapping;
  renderer.toneMappingExposure = 1;
  document.body.prepend(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(_isDark ? 0x000000 : 0xffffff);
  scene.fog = null; // activé après la transition caméra

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.copy(CAM_START);
  camera.lookAt(CAM_LOOK_START);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping   = true;
  controls.dampingFactor   = 0.06;
  controls.enablePan       = false;
  controls.minDistance     = 2.25;
  controls.maxDistance     = 67;
  controls.autoRotate      = false;
  controls.autoRotateSpeed = 0.25;
  controls.enabled         = false;
  controls.target.set(0, 0, -9.75);
  controls.update();
  const lerpTarget = new THREE.Vector3(0, 0, -9.75);

  const cssRenderer = new CSS3DRenderer();
  cssRenderer.setSize(window.innerWidth, window.innerHeight);
  Object.assign(cssRenderer.domElement.style, {
    position: 'fixed', top: '0', left: '0', pointerEvents: 'none', zIndex: '2'
  });
  document.body.appendChild(cssRenderer.domElement);
  const cssScene = new THREE.Scene();

  const CARD_SCALE = 1 / 110;
  const CARD_OFFSETS = [
    { dx:  1.8,  dy:  0.35, dz:  0.2,  ry: -18, w: 300, h: 190, type: 'image' },
    { dx: -2.2,  dy:  0.6,  dz: -0.3,  ry:  16, w: 185, h: 260, type: 'image' },
    { dx:  0.5,  dy: -1.0,  dz:  0.8,  ry:  -7, w: 250, h: 155, type: 'image' },
    { dx: -0.9,  dy:  1.3,  dz: -1.6,  ry:  12, w: 220, h: 145, type: 'image' },
    { dx:  4.6,  dy: -0.6,  dz: -0.5,  ry: -24, w: 210, h: 290, type: 'image' },
    { dx: -2.7,  dy: -0.9,  dz:  0.35, ry:  -8, w: 235, h: 165, type: 'image' },
  ];
  let floatingCards = [];
  let cardHitPlanes = [];

  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bokehPass = new BokehPass(scene, camera, { focus: 50.0, aperture: 0.0003, maxblur: 0.004 });
  composer.addPass(bokehPass);
  composer.addPass(new OutputPass());

  // Variables d’état partagées — déclarées avant animate() pour éviter le TDZ
  let _frame = 0;
  let nodeMap = {}, nodeMeshes = [], ringMeshes = [], edgeMeshes = [], pMat = null;
  const nodeGeoN1     = new THREE.BoxGeometry(0.175, 0.175, 0.175);
  const nodeGeoN2     = new THREE.SphereGeometry(0.09, 12, 8);
  const COLOR_DEFAULT = new THREE.Color(0x444444);
  const COLOR_N2      = new THREE.Color(0x666666);
  const COLOR_ACTIVE  = new THREE.Color(0x111111);
  let activeNodeMesh  = null;
  let lerpCameraPos   = new THREE.Vector3(4, 3, 14);
  let isZooming       = false;
  let pendingCardCourant  = null;
  let camTransition = false, camTransitionStart = 0;
  let labelEls = [];       // peuplé après API fetch
  let tlDotMap = {};       // peuplé après API fetch
  let courants = [], edges = []; // peuplé après API fetch
  let navDotsEl = null;          // peuplé après API fetch

  document.getElementById('title').style.opacity    = '0';
  document.getElementById('hint').style.opacity     = '0';
  document.getElementById('timeline').style.opacity = '0';

  const clock = new THREE.Clock();
  clock.start();
  animate(); // function declaration hoistée — scène vide au départ, se peuple après API

  // ─── CHARGEMENT API ─────────────────────────────────────────────────
  setProgress(5);
  let _apiData;
  try {
    const res = await fetch('api/courants.php');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    _apiData = await res.json();
  } catch (err) {
    console.warn('API inaccessible, mode dégradé :', err.message);
    _apiData = null;
  }
  setProgress(20);

  // Si API KO → on construit un jeu minimal depuis FALLBACK_CONTENT
  // (positions réelles en dur, indispensables pour la 3D)
  const FALLBACK_POSITIONS = {
    'arts-crafts':   [-3, 0.5, 2],   'art-nouveau':   [3, 1, 0],
    'bauhaus':       [0, 0, -4],      'style-suisse':  [-2, -0.5, -8],
    'pop-art':       [4, 1, -7],      'psychedelique': [5, 2, -10],
    'postmodernisme':[2, -1, -13],    'grunge':        [-3, -1.5, -16],
    'flat-design':   [0, 0, -20],     'pixel-art':     [-5, 1.5, -11],
  };
  const FALLBACK_DA = {
    'arts-crafts':   ['#c9a84c','"Georgia", serif'],
    'art-nouveau':   ['#7aab6e','"Palatino Linotype", serif'],
    'bauhaus':       ['#e63946','"Helvetica Neue", sans-serif'],
    'style-suisse':  ['#1d6fa4','"Helvetica Neue", sans-serif'],
    'pop-art':       ['#ffb703','"Impact", sans-serif'],
    'psychedelique': ['#9b5de5','"Trebuchet MS", cursive'],
    'postmodernisme':['#f72585','"Times New Roman", serif'],
    'grunge':        ['#c49a6c','"Courier New", monospace'],
    'flat-design':   ['#00b4d8','"Segoe UI", sans-serif'],
    'pixel-art':     ['#06d6a0','"Courier New", monospace'],
  };
  const FALLBACK_EDGES = [
    ['arts-crafts','art-nouveau'],['arts-crafts','bauhaus'],['art-nouveau','bauhaus'],
    ['bauhaus','style-suisse'],['bauhaus','pop-art'],['bauhaus','pixel-art'],
    ['style-suisse','postmodernisme'],['style-suisse','flat-design'],
    ['pop-art','psychedelique'],['pop-art','postmodernisme'],
    ['psychedelique','postmodernisme'],['postmodernisme','grunge'],
    ['grunge','flat-design'],['postmodernisme','flat-design'],
  ];

  // courants et edges sont déclarés dans le bloc init — on les assigne ici
  if (_apiData) {
    ({ courants, edges } = mapApiData(_apiData));
  } else {
    courants = Object.entries(FALLBACK_CONTENT).map(([slug, fb]) => {
      const [px, py, pz] = FALLBACK_POSITIONS[slug] || [0,0,0];
      const [couleur, typo] = FALLBACK_DA[slug] || ['#888','sans-serif'];
      return { id: slug, nom: slug, periode: fb.periode, couleur, typographie: typo,
               description: fb.description, mots_cles: fb.mots_cles || [], artistes: fb.artistes,
               principes: fb.principes, images: [], image: null, position: new THREE.Vector3(px, py, pz) };
    });
    edges = FALLBACK_EDGES.map(([from, to]) => ({ from, to }));
  }

  // ─── NŒUDS, ARÊTES, PARTICULES — créés dès que courants est disponible ───────────────
  courants.forEach(c => {
    const isN2 = c.niveau === 2;
    const geo  = isN2 ? nodeGeoN2 : nodeGeoN1;
    const mat  = new THREE.MeshBasicMaterial({ color: isN2 ? COLOR_N2.clone() : COLOR_DEFAULT.clone(), transparent: true, opacity: 0 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(c.position);
    mesh.scale.setScalar(1);
    mesh.userData = c;
    scene.add(mesh);
    nodeMap[c.id] = mesh;
    nodeMeshes.push(mesh);
    const rInner = isN2 ? 0.10 : 0.17;
    const rOuter = isN2 ? 0.13 : 0.21;
    const ringGeo = new THREE.RingGeometry(rInner, rOuter, 40);
    const ringMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(0x111111), transparent: true, opacity: 0, side: THREE.DoubleSide });
    const ring    = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(c.position);
    scene.add(ring);
    ringMeshes.push(ring);
  });
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    const isSubEdge = a.userData.niveau === 2 || b.userData.niveau === 2;
    const mid = a.position.clone().lerp(b.position, 0.5)
      .add(new THREE.Vector3((Math.random()-0.5)*1.8,(Math.random()-0.5)*1.2,0));
    const curve   = new THREE.QuadraticBezierCurve3(a.position, mid, b.position);
    const tubeGeo = new THREE.TubeGeometry(curve, 24, isSubEdge ? 0.006 : 0.012, 6, false);
    const tubeMat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0 });
    const edgeMesh = new THREE.Mesh(tubeGeo, tubeMat);
    edgeMesh.userData.targetOpacity = isSubEdge ? 0.25 : 0.5;
    scene.add(edgeMesh);
    edgeMeshes.push(edgeMesh);
  });
  {
    const pCount = 4000;
    const pPos = new Float32Array(pCount * 3);
    for (let i = 0; i < pCount; i++) {
      pPos[i*3]=(Math.random()-0.5)*100; pPos[i*3+1]=(Math.random()-0.5)*70; pPos[i*3+2]=(Math.random()-0.5)*100;
    }
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    pMat = new THREE.PointsMaterial({ color: 0x555555, size: 0.09, transparent: true, opacity: 0, sizeAttenuation: true });
    scene.add(new THREE.Points(pGeo, pMat));
  }

  // ─── PRELOAD IMAGES — allume les nœuds en 3D au fur et à mesure ────────────────
  const imgTotal = courants.length || 1;
  let imgDone = 0;
  await Promise.all(courants.map(c => new Promise(resolve => {
    const url = (c.images || [])[0] || null;
    const done = () => {
      imgDone++;
      setProgress(20 + (imgDone / imgTotal) * 45, c.nom.toUpperCase());
      nodeMap[c.id].material.color.set(c.couleur);
      nodeMap[c.id].material.opacity = 1;
      resolve();
    };
    if (!url) { done(); return; }
    const img = new Image();
    img.onload = img.onerror = done;
    img.src = url;
  })));

  // Preload fichiers audio (ArrayBuffer) — progression 65→100%
  // Stockés dans eraAudioCache pour lecture instantanée au premier clic
  const ERA_FILES = [
    'sounds/1800.mp3','sounds/1880.mp3','sounds/1910.mp3','sounds/1930.mp3',
    'sounds/1950.mp3','sounds/1975.mp3','sounds/1995.mp3','sounds/2010.mp3',
  ];
  const eraAudioCache = {};
  const audioTotal = ERA_FILES.length;
  await Promise.all(ERA_FILES.map((file, i) => {
    const label = file.replace('sounds/', '').replace(/\.\w+$/, '');
    return fetch(file)
      .then(r => r.arrayBuffer())
      .then(ab => {
        eraAudioCache[file] = ab; // ArrayBuffer — sera décodé au premier usage
        setProgress(65 + ((i + 1) / audioTotal) * 35, label);
      })
      .catch(() => setProgress(65 + ((i + 1) / audioTotal) * 35, label));
  }));

  // ─────────────────────────────────────────────────────────────────
  // LABELS
  // ─────────────────────────────────────────────────────────────────

  const labelContainer = document.getElementById('labels');
  labelEls = [];

  courants.forEach(c => {
    const el = document.createElement('div');
    el.className = 'label3d';
    const year = c.periode ? c.periode.split('–')[0].trim() : null;
    el.textContent = year ? `${c.nom} · ${year}` : c.nom;
    el.style.fontFamily = c.typographie;
    labelContainer.appendChild(el);
    labelEls.push({ el, c });
  });

  function updateLabels() {
    labelEls.forEach(({ el, c }) => {
      const pos = c.position.clone().project(camera);
      if (pos.z > 1) { el.style.opacity = 0; return; }
      const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
      el.style.left = x + 'px';
      el.style.top  = (y + 20) + 'px';
      const dist = camera.position.distanceTo(c.position);
      const isActive = activeNodeMesh && activeNodeMesh.userData.id === c.id;
      let opacity;
      if (isActive) {
        opacity = 0.85;
      } else if (c.niveau === 2) {
        opacity = Math.max(0, Math.min(0.55, 1 - (dist - 2) / 8));
      } else {
        // Niveau 1 : toujours lisible, min 0.22
        opacity = Math.max(0.22, Math.min(0.75, 1 - (dist - 3) / 18));
      }
      el.style.opacity = opacity;
      el.style.fontWeight = isActive ? '600' : '';
    });
  }

  // ─────────────────────────────────────────────────────────────────
  // NAV DOTS
  // ─────────────────────────────────────────────────────────────────

  navDotsEl = document.getElementById('nav-dots');
  courants.forEach((c, i) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot';
    dot.title = c.nom;
    dot.addEventListener('click', () => { navigateTo(c, nodeMap[c.id]); });
    navDotsEl.appendChild(dot);
  });

  function updateNavDots() {
    if (!navDotsEl) return;
    let closest = 0, minD = Infinity;
    courants.forEach((c, i) => {
      const d = camera.position.distanceTo(c.position);
      if (d < minD) { minD = d; closest = i; }
    });
    navDotsEl.querySelectorAll('.nav-dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === closest);
    });
  }

  // ─────────────────────────────────────────────────────────────────
  // MINI TIMELINE
  // ─────────────────────────────────────────────────────────────────

  const TL_MIN = 1880, TL_MAX = 2025;
  const tlPct  = y => ((y - TL_MIN) / (TL_MAX - TL_MIN)) * 100;

  const tlYearsEl  = document.getElementById('timeline-years');
  const tlDotsEl   = document.getElementById('timeline-dots');
  const tlMarkerEl = document.getElementById('timeline-marker');
  const tlYearLbl  = document.getElementById('timeline-marker-year');
  const tlNomLbl   = document.getElementById('timeline-marker-nom');

  [1880, 1900, 1920, 1940, 1960, 1980, 2000, 2020].forEach(y => {
    const el = document.createElement('span');
    el.className = 'tl-year';
    el.style.left = tlPct(y) + '%';
    el.textContent = y;
    tlYearsEl.appendChild(el);
  });

  tlDotMap = {};
  courants.forEach(c => {
    const year = c.periode ? parseInt(c.periode.match(/(\d{4})/)?.[1]) : null;
    if (!year) return;
    const dot = document.createElement('div');
    dot.className = 'tl-dot' + (c.niveau === 2 ? ' sub' : '');
    dot.style.left = tlPct(year) + '%';
    dot.title = `${c.nom} · ${year}`;
    dot.addEventListener('click', () => navigateTo(c, nodeMap[c.id]));
    tlDotsEl.appendChild(dot);
    tlDotMap[c.id] = { dot, year };
  });
  // ─────────────────────────────────────────────────────────────────

  function spawnFloatingCards(c) {
    clearFloatingCards();
    const pos  = c.position;
    const imgs = c.images || [];
    // Orientation de la carte info vers la caméra (yaw uniquement)
    const toCam = camera.position.clone().sub(pos).normalize();
    const camRy = Math.atan2(toCam.x, toCam.z);

    CARD_OFFSETS.forEach((off, i) => {
      const el = document.createElement('div');
      el.className = 'float-card';
      el.style.width  = off.w + 'px';

      const src = imgs[i] || null;
      // Clics gérés via hit planes THREE.js (voir cardHitPlanes) — plus fiable que CSS3D hit-testing
      el.style.pointerEvents = 'none';
      if (src) {
        const img = document.createElement('img');
        img.src = src;
        el.appendChild(img);
      } else {
        el.style.height = off.h + 'px';
        const inner = document.createElement('div');
        inner.className = 'float-card-inner';
        inner.style.background = `linear-gradient(135deg, ${c.couleur}22 0%, ${c.couleur}07 100%)`;
        inner.style.border     = `1px solid ${c.couleur}30`;
        inner.style.width      = '100%';
        inner.style.height     = '100%';
        const lbl = document.createElement('span');
        lbl.style.cssText = `font-family:${c.typographie};font-size:${8+i}px;letter-spacing:0.45em;text-transform:uppercase;color:${c.couleur};opacity:0.35`;
        lbl.textContent = c.nom;
        inner.appendChild(lbl);
        el.appendChild(inner);
      }

      const obj = new CSS3DObject(el);
      obj.position.set(pos.x + off.dx, pos.y + off.dy, pos.z + off.dz);
      obj.rotation.y    = camRy + off.ry * Math.PI / 180;
      obj.scale.setScalar(CARD_SCALE / (off.res || 1));
      obj.userData.baseY = pos.y + off.dy;
      obj.userData.baseX = pos.x + off.dx;
      obj.userData.phase = i * 1.5;
      obj.userData.ampY  = 0.06 + i * 0.015;
      cssScene.add(obj);
      floatingCards.push(obj);
      // Plan invisible THREE.js pour hit-testing fiable
      const planeGeo = new THREE.PlaneGeometry(off.w * CARD_SCALE, off.h * CARD_SCALE);
      const planeMat = new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide });
      const plane = new THREE.Mesh(planeGeo, planeMat);
      plane.position.copy(obj.position);
      plane.rotation.y = obj.rotation.y;
      plane.userData.cardImages = imgs;
      plane.userData.cardIndex  = i;
      plane.userData.floatRef   = obj;
      scene.add(plane);
      cardHitPlanes.push(plane);
      setTimeout(() => el.classList.add('visible'), 480 + i * 54);
    });
  }

  function clearFloatingCards() {
    floatingCards.forEach(obj => cssScene.remove(obj));
    floatingCards = [];
    cardHitPlanes.forEach(m => scene.remove(m));
    cardHitPlanes = [];
  }

  // ─────────────────────────────────────────────────────────────────
  // INFO PANEL 2D
  // ─────────────────────────────────────────────────────────────────

  const tlTabEl         = document.getElementById('tl-tab');
  const tlTabYearEl     = document.getElementById('tl-tab-year');
  const tlTabNomEl      = document.getElementById('tl-tab-nom');
  const tooltipEl       = document.getElementById('tl-tooltip');
  const tooltipScrollEl = document.getElementById('tl-tooltip-scroll');
  const tooltipCloseEl  = document.getElementById('tl-tooltip-close');
  let   currentPanelSlug = null;
  let   currentCourant   = null;

  function openInfoPanel(slug, c) {
    currentPanelSlug     = slug;
    currentCourant       = c;
    tooltipEl.classList.remove('open');
    tlTabYearEl.textContent = c?.periode || '';
    tlTabNomEl.textContent  = c?.nom     || '';
    const col = c?.couleur || null;
    tlTabEl.style.borderColor      = col ? col : '';
    tlTabEl.style.backgroundColor  = col ? col : '';
    tlTabEl.style.color            = col ? '#fff' : '';
    tlTabEl.classList.add('visible');
  }

  function positionTooltip() {
    const tlEl      = document.getElementById('timeline');
    const markerEl  = document.getElementById('timeline-marker');
    const tlRect    = tlEl.getBoundingClientRect();
    const markerPct = parseFloat(markerEl.style.left) / 100 || 0.5;
    const markerX   = tlRect.left + tlRect.width * markerPct;
    const tipW      = Math.min(650, window.innerWidth - 32);
    const tipLeft   = Math.max(16, Math.min(markerX - tipW / 2, window.innerWidth - tipW - 16));
    tooltipEl.style.left  = tipLeft + 'px';
    tooltipEl.style.width = tipW + 'px';
  }

  function openTooltip() {
    if (!currentPanelSlug || !currentCourant) return;
    positionTooltip();
    tooltipScrollEl.innerHTML = `
      <div class="ip-skel ip-skel-short"></div>
      <div class="ip-skel ip-skel-title"></div>
      <div class="ip-skel ip-skel-bar"></div>
      <div class="ip-skel ip-skel-text"></div>
      <div class="ip-skel ip-skel-text w85"></div>
      <div class="ip-skel ip-skel-text"></div>
      <div class="ip-skel ip-skel-text w70"></div>
    `;
    tooltipEl.classList.add('open');
    const col = currentCourant?.couleur || null;
    const inner = document.getElementById('tl-tooltip-inner');
    if (inner) inner.style.borderColor = col ? col : '';
    if (inner) inner.style.boxShadow   = col ? `0 8px 40px ${col}33` : '0 8px 40px rgba(0,0,0,0.12)';
    const slug = currentPanelSlug;
    const c    = currentCourant;
    fetch(`api/courants.php?slug=${encodeURIComponent(slug)}`)
      .then(r => r.json())
      .then(data => {
        if (currentPanelSlug !== slug) return;
        renderInfoPanel(data, c);
      })
      .catch(() => { if (currentPanelSlug === slug) renderInfoPanel(null, c); });
  }

  function renderInfoPanel(data, c) {
    const desc      = data?.description_longue || data?.description_courte || c?.description || '';
    const artistes  = (data?.artistes?.length ? data.artistes : null) || c?.artistes || [];
    const keypoints = data?.key_points || c?.principes || '';
    const mots_cles = data?.mots_cles || c?.mots_cles || [];
    const wikiUrl   = data?.wikipedia_url || null;
    const couleur   = c?.couleur || '#888';
    const typo      = c?.typographie || 'inherit';

    const artistesHtml = artistes.length ? `
      <div class="ip-section-label">Artistes</div>
      <ul id="ip-artistes">
        ${artistes.map(a => {
          const nom   = typeof a === 'string' ? a : (a.nom || a);
          const dates = a.naissance ? `${a.naissance}${a.deces ? ` – ${a.deces}` : ''}` : '';
          const nat   = a.nationalite ? ` · ${a.nationalite}` : '';
          const url   = a.wikipedia_url || null;
          const inner = `<span class="ip-artiste-nom">${nom}</span><span class="ip-artiste-meta">${dates}${nat}</span>`;
          return `<li>${url
            ? `<a class="ip-artiste" href="${url}" target="_blank" rel="noopener">${inner}</a>`
            : `<div class="ip-artiste">${inner}</div>`
          }</li>`;
        }).join('')}
      </ul>` : '';

    const keypointsHtml = keypoints
      ? `<div class="ip-section-label">Principes</div><div id="ip-keypoints">${keypoints}</div>` : '';

    const tagsHtml = mots_cles.length
      ? `<div id="ip-tags">${mots_cles.map(t => `<span class="ip-tag" style="color:${couleur}">${t}</span>`).join('')}</div>` : '';

    const wikiHtml = wikiUrl
      ? `<a id="ip-wiki" href="${wikiUrl}" target="_blank" rel="noopener">↗ Wikipedia</a>` : '';

    tooltipScrollEl.innerHTML = `
      <div id="ip-periode">${c?.periode || ''}</div>
      <div id="ip-nom" style="font-family:${typo};color:${couleur}">${c?.nom || ''}</div>
      <div id="ip-bar" style="background:${couleur}"></div>
      <div id="ip-desc">${desc}</div>
      ${wikiHtml}
      ${artistesHtml}
      ${keypointsHtml}
      ${tagsHtml}
    `;
    tooltipScrollEl.scrollTop = 0;
  }

  function closeInfoPanel() {
    tlTabEl.classList.remove('visible');
    tooltipEl.classList.remove('open');
    currentPanelSlug = null;
    currentCourant   = null;
  }

  // ─────────────────────────────────────────────────────────────────
  // NAVIGATION
  // ─────────────────────────────────────────────────────────────────

  const bgTypoSpan = document.querySelector('#bg-typo span');

  function navigateTo(c, mesh) {
    if (camTransition || isZooming) return;
    lerpTarget.copy(c.position);

    // Typo monumentale
    bgTypoSpan.style.fontFamily = c.typographie || 'inherit';
    bgTypoSpan.style.color      = c.couleur || '#111';
    bgTypoSpan.textContent      = c.nom;
    bgTypoSpan.style.opacity    = document.documentElement.dataset.theme === 'dark' ? '0.03' : '0.07';

    // Timeline
    const tlEntry = tlDotMap[c.id];
    if (tlEntry) {
      Object.values(tlDotMap).forEach(e => {
        e.dot.classList.remove('active');
        e.dot.style.background = '';
      });
      tlEntry.dot.classList.add('active');
      tlEntry.dot.style.background   = c.couleur || '#111';
      tlMarkerEl.style.left          = tlPct(tlEntry.year) + '%';
      tlMarkerEl.style.background    = c.couleur || 'rgba(0,0,0,0.35)';
      tlMarkerEl.style.opacity       = '1';
      tlYearLbl.textContent          = tlEntry.year;
      tlYearLbl.style.color          = c.couleur || 'rgba(0,0,0,0.45)';
      tlNomLbl.textContent           = c.nom;
      tlNomLbl.style.color           = c.couleur || 'rgba(0,0,0,0.35)';
    }

    // Désactiver le noeud précédent
    if (activeNodeMesh && activeNodeMesh !== mesh) {
      activeNodeMesh.material.color.set(COLOR_DEFAULT);
      const prevRing = ringMeshes[nodeMeshes.indexOf(activeNodeMesh)];
      if (prevRing) prevRing.material.opacity = 0;
    }

    // Activer le nouveau
    activeNodeMesh = mesh;
    mesh.material.color.set(c.couleur || COLOR_ACTIVE);
    const ring = ringMeshes[nodeMeshes.indexOf(mesh)];
    if (ring) {
      ring.material.color.set(c.couleur || COLOR_ACTIVE);
      ring.material.opacity = 0.2;
    }

    // Position caméra : approche stable — évite les angles extrêmes sur les sauts lointains
    const rawDir = camera.position.clone().sub(c.position);
    const dist   = rawDir.length();
    rawDir.normalize();
    const preferred = new THREE.Vector3(0.2, 0.4, 0.9).normalize();
    const blend     = dist > 8 ? 0.75 : 0.55;
    const finalDir  = rawDir.clone().lerp(preferred, blend).normalize();
    // Garantir une légère élévation — jamais sous le nœud
    if (finalDir.y < 0.15) { finalDir.y = 0.15; finalDir.normalize(); }
    const approachDist = 5.5;
    lerpCameraPos.copy(c.position).addScaledVector(finalDir, approachDist);
    isZooming = true;
    controls.enabled = false;
    pendingCardCourant = c; // cartes spawnées une fois la caméra arrivée
    clearFloatingCards();   // vider immédiatement les cartes de la sélection précédente
    openInfoPanel(c.id, c);

    // ERA AUDIO
    if (audioStarted && !audioMuted) {
      const debutYear = c.periode ? parseInt(c.periode.match(/(\d{4})/)?.[1]) : null;
      if (debutYear) playEraAudio(getEraFile(debutYear));
    }
  }

  // ─────────────────────────────────────────────────────────────────
  // RAYCASTER
  // ─────────────────────────────────────────────────────────────────

  const raycaster    = new THREE.Raycaster();
  const mouse        = new THREE.Vector2();
  const cursorEl     = document.getElementById('cursor');
  let   cursorX = 0, cursorY = 0;

  // Curseur personnalisé
  let _rayPending = false;
  window.addEventListener('mousemove', e => {
    cursorX = e.clientX;
    cursorY = e.clientY;
    cursorEl.style.left = cursorX + 'px';
    cursorEl.style.top  = cursorY + 'px';
    mouse.x = (e.clientX / window.innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    if (_rayPending) return;
    _rayPending = true;
    requestAnimationFrame(() => {
      _rayPending = false;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(nodeMeshes);
      if (hits.length > 0) {
        const col = hits[0].object.userData.couleur || '#111';
        cursorEl.style.width       = '16px';
        cursorEl.style.height      = '16px';
        cursorEl.style.background  = col;
        cursorEl.style.borderColor = col;
        cursorEl.style.opacity     = '0.85';
      } else {
        cursorEl.style.width       = '10px';
        cursorEl.style.height      = '10px';
        cursorEl.style.background  = 'transparent';
        cursorEl.style.borderColor = document.documentElement.dataset.theme === 'dark' ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.5)';
        cursorEl.style.opacity     = '1';
      }
    });
  });

  function addStopAutoRotate() {
    renderer.domElement.addEventListener('pointerdown', () => { controls.autoRotate = false; }, { once: true });
  }
  addStopAutoRotate();

  let pointerMoved = false;
  let pointerDownX = 0, pointerDownY = 0;
  window.addEventListener('pointerdown', e => { pointerMoved = false; pointerDownX = e.clientX; pointerDownY = e.clientY; });
  window.addEventListener('pointermove', e => {
    if (e.buttons > 0) {
      const dx = e.clientX - pointerDownX;
      const dy = e.clientY - pointerDownY;
      if (Math.sqrt(dx * dx + dy * dy) > 5) pointerMoved = true;
    }
  });

  window.addEventListener('click', e => {
    // Ignorer les clics sur les éléments UI (boutons, timeline, nav-dots)
    if (e.target.closest('#btn-mute, #btn-theme, #timeline, #nav-dots, #lightbox, #ls, #tl-tooltip')) return;
    if (pointerMoved) return;
    if (camTransition || isZooming) return;
    mouse.x = (e.clientX / window.innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    // Hit planes des image cards — plus fiable que CSS3D hit-testing
    const cardHits = raycaster.intersectObjects(cardHitPlanes);
    if (cardHits.length > 0) {
      const { cardImages, cardIndex } = cardHits[0].object.userData;
      openLightbox(cardImages, cardIndex);
      return;
    }

    const hits = raycaster.intersectObjects(nodeMeshes);
    if (hits.length > 0) {
      const mesh = hits[0].object;
      const c = mesh.userData;
      if (c && c.nom) { navigateTo(c, mesh); }
    } else {
      deselect();
    }
  });

  function deselect() {
    clearFloatingCards();
    closeInfoPanel();
    pendingCardCourant = null;
    stopEraAudio();
    if (activeNodeMesh) {
      const isN2 = activeNodeMesh.userData.niveau === 2;
      activeNodeMesh.material.color.set(isN2 ? COLOR_N2 : COLOR_DEFAULT);
      const prevRing = ringMeshes[nodeMeshes.indexOf(activeNodeMesh)];
      if (prevRing) prevRing.material.opacity = 0;
      activeNodeMesh = null;
    }
    bgTypoSpan.style.opacity = '0';
    tlMarkerEl.style.opacity = '0';
    Object.values(tlDotMap).forEach(e => { e.dot.classList.remove('active'); e.dot.style.background = ''; });
  }

  function resetView() {
    clearFloatingCards();
    closeInfoPanel();
    stopEraAudio();
    if (activeNodeMesh) {
      const isN2 = activeNodeMesh.userData.niveau === 2;
      activeNodeMesh.material.color.set(isN2 ? COLOR_N2 : COLOR_DEFAULT);
      const prevRing = ringMeshes[nodeMeshes.indexOf(activeNodeMesh)];
      if (prevRing) prevRing.material.opacity = 0;
      activeNodeMesh = null;
    }
    lerpTarget.set(0, 0, -9.75);
    lerpCameraPos.set(6.75, 5.25, 24.75);
    isZooming = true;
    controls.enabled = false;
    controls.autoRotate = true;
    addStopAutoRotate();
    bgTypoSpan.style.opacity = '0';
    tlMarkerEl.style.opacity = '0';
    Object.values(tlDotMap).forEach(e => { e.dot.classList.remove('active'); e.dot.style.background = ''; });
  }

  window.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (lightboxEl.classList.contains('active')) { closeLightbox(); return; }
      if (tooltipEl.classList.contains('open')) { tooltipEl.classList.remove('open'); return; }
      deselect();
    }
    if (lightboxEl.classList.contains('active')) {
      if (e.key === 'ArrowLeft')  { lbPrev.click(); }
      if (e.key === 'ArrowRight') { lbNext.click(); }
    }
  });

  // ─────────────────────────────────────────────────────────────────
  // LIGHTBOX
  // ─────────────────────────────────────────────────────────────────

  let lbImages = [];
  let lbIndex  = 0;

  const lightboxEl = document.getElementById('lightbox');
  const lbImgEl    = document.getElementById('lb-img');
  const lbCounter  = document.getElementById('lb-counter');
  const lbClose    = document.getElementById('lb-close');
  const lbPrev     = document.getElementById('lb-prev');
  const lbNext     = document.getElementById('lb-next');

  function openLightbox(images, startIndex) {
    lbImages = (images || []).filter(Boolean);
    if (lbImages.length === 0) return;
    lbIndex = Math.min(startIndex, lbImages.length - 1);
    updateLbImage();
    lightboxEl.classList.add('active');
  }

  function closeLightbox() {
    lightboxEl.classList.remove('active');
  }

  function updateLbImage() {
    lbImgEl.src = lbImages[lbIndex];
    lbCounter.textContent = lbImages.length > 1 ? `${lbIndex + 1}  /  ${lbImages.length}` : '';
    lbPrev.style.visibility = lbImages.length > 1 ? 'visible' : 'hidden';
    lbNext.style.visibility = lbImages.length > 1 ? 'visible' : 'hidden';
  }

  lbClose.addEventListener('click', closeLightbox);
  lightboxEl.addEventListener('click', e => { if (e.target === lightboxEl) closeLightbox(); });

  tlTabEl.addEventListener('click', openTooltip);
  tooltipCloseEl.addEventListener('click', () => tooltipEl.classList.remove('open'));
  lbPrev.addEventListener('click', e => {
    e.stopPropagation();
    lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length;
    updateLbImage();
  });
  lbNext.addEventListener('click', e => {
    e.stopPropagation();
    lbIndex = (lbIndex + 1) % lbImages.length;
    updateLbImage();
  });

  // ─────────────────────────────────────────────────────────────────
  // DARK THEME
  // ─────────────────────────────────────────────────────────────────

  const THEME = {
    light: { bg: 0xffffff, fog: 0xffffff, node: 0x444444, nodeN2: 0x666666, tube: 0x555555, part: 0x444444 },
    dark:  { bg: 0x000000, fog: 0x000000, node: 0x2a2a2a, nodeN2: 0x3a3a3a, tube: 0x1a1a1a, part: 0x333333 },
  };

  function setTheme(isDark) {
    const t = isDark ? THEME.dark : THEME.light;
    document.documentElement.dataset.theme = isDark ? 'dark' : '';
    scene.background.set(t.bg);
    if (scene.fog) scene.fog.color.set(t.fog);
    COLOR_DEFAULT.set(t.node);
    COLOR_N2.set(t.nodeN2);
    nodeMeshes.forEach(mesh => {
      if (mesh !== activeNodeMesh) {
        mesh.material.color.set(mesh.userData.niveau === 2 ? t.nodeN2 : t.node);
      }
    });
    const tubeOpacityScale = isDark ? 0.45 : 1;
    edgeMeshes.forEach(m => {
      m.material.color.set(t.tube);
      m.material.opacity = m.userData.targetOpacity * tubeOpacityScale;
    });
    pMat.color.set(t.part);
    btnTheme.textContent = isDark ? '○' : '◐';
    localStorage.setItem('atlas-theme', isDark ? 'dark' : 'light');
  }

  const btnTheme = document.getElementById('btn-theme');
  btnTheme.addEventListener('click', () => {
    setTheme(document.documentElement.dataset.theme !== 'dark');
  });

  // Init depuis localStorage
  if (localStorage.getItem('atlas-theme') === 'dark') setTheme(true);

  // ─────────────────────────────────────────────────────────────────
  // AUDIO — contexte + mute (son par ère, pas de synthé global)
  // ─────────────────────────────────────────────────────────────────

  let audioCtx     = null;
  let audioStarted = false;
  let audioMuted   = false;
  const btnMute    = document.getElementById('btn-mute');

  function startAudio() {
    if (audioStarted) return;
    audioStarted = true;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function toggleMute() {
    if (!audioStarted) startAudio(); // toujours démarrer si pas encore fait
    audioMuted = !audioMuted;
    if (eraGainNode) {
      eraGainNode.gain.linearRampToValueAtTime(
        audioMuted ? 0 : 0.65, audioCtx.currentTime + 0.6
      );
    }
    btnMute.classList.toggle('muted', audioMuted);
    btnMute.textContent = audioMuted ? '♪' : '♫';
  }

  btnMute.addEventListener('click', toggleMute);
  // Démarrer l'AudioContext sur tout premier clic dans la page
  document.addEventListener('pointerdown', () => {
    if (!audioStarted) startAudio();
  }, { once: true });

  // ─────────────────────────────────────────────────────────────────
  // ERA AUDIO — crossfade par tranche temporelle
  // ─────────────────────────────────────────────────────────────────

  const ERA_BUCKETS = [
    { from:    0, to: 1880, file: 'sounds/1800.mp3' }, // < 1880 : romantique tardif
    { from: 1880, to: 1910, file: 'sounds/1880.mp3' }, // impressionnisme
    { from: 1910, to: 1930, file: 'sounds/1910.mp3' }, // jazz primitif
    { from: 1930, to: 1950, file: 'sounds/1930.mp3' }, // swing
    { from: 1950, to: 1975, file: 'sounds/1950.mp3' }, // électronique expérimentale
    { from: 1975, to: 1995, file: 'sounds/1975.mp3' }, // synthés / new wave
    { from: 1995, to: 2010, file: 'sounds/1995.mp3' }, // electronica ambient
    { from: 2010, to: 2100, file: 'sounds/2010.mp3' }, // nappes numériques
  ];

  let eraSource      = null;
  let eraGainNode    = null;
  let currentEraFile = null;

  function getEraFile(debutYear) {
    const b = ERA_BUCKETS.find(e => debutYear >= e.from && debutYear < e.to);
    return b ? b.file : null;
  }

  async function loadEraBuffer(url) {
    if (eraAudioCache[url] instanceof AudioBuffer) return eraAudioCache[url];
    // Si préchargé comme ArrayBuffer, décoder maintenant
    if (eraAudioCache[url] instanceof ArrayBuffer) {
      const decoded = await audioCtx.decodeAudioData(eraAudioCache[url].slice(0));
      eraAudioCache[url] = decoded;
      return decoded;
    }
    // Fallback : fetch à la volée
    const res = await fetch(url);
    const ab  = await res.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(ab);
    eraAudioCache[url] = decoded;
    return decoded;
  }

  function stopEraAudio(duration = 1.8) {
    if (!eraGainNode || !audioCtx) return;
    currentEraFile = null;
    eraGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
    const g = eraGainNode, s = eraSource;
    setTimeout(() => { try { s?.stop(); } catch(e) {} }, (duration + 0.1) * 1000);
    eraGainNode = null; eraSource = null;
  }

  async function playEraAudio(file) {
    if (!audioCtx || audioMuted) return;
    if (file === currentEraFile) return;
    stopEraAudio(1.5);
    if (!file) return;
    currentEraFile = file;
    try {
      console.log('[era] loading:', file);
      const buffer = await loadEraBuffer(file);
      if (currentEraFile !== file) return; // changé pendant le chargement
      console.log('[era] playing:', file, 'duration:', buffer.duration.toFixed(1) + 's');
      eraGainNode = audioCtx.createGain();
      eraGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      eraGainNode.gain.linearRampToValueAtTime(0.65, audioCtx.currentTime + 2);
      eraGainNode.connect(audioCtx.destination);
      eraSource = audioCtx.createBufferSource();
      eraSource.buffer = buffer;
      eraSource.loop   = true;
      eraSource.connect(eraGainNode);
      eraSource.start();
    } catch(err) {
      console.warn('[era] load failed:', err);
      currentEraFile = null;
    }
  }

  // ─────────────────────────────────────────────────────────────────
  // ANIMATE
  // ─────────────────────────────────────────────────────────────────

  function animate() {
    requestAnimationFrame(animate);
    _frame++;
    const t = clock.getElapsedTime();

    if (activeNodeMesh) {
      const dist = camera.position.distanceTo(activeNodeMesh.position);
      bokehPass.uniforms['focus'].value += (dist - bokehPass.uniforms['focus'].value) * 0.05;
    }
    // Zoom vers le noeud actif — cartes spawnées à l'arrivée
    if (isZooming) {
      camera.position.lerp(lerpCameraPos, 0.05);
      if (camera.position.distanceTo(lerpCameraPos) < 0.25) {
        isZooming = false;
        controls.enabled = true;
        if (pendingCardCourant) {
          spawnFloatingCards(pendingCardCourant);
          pendingCardCourant = null;
        }
      }
    }

    // Transition caméra post-loading
    if (camTransition) {
      const elapsed  = t - camTransitionStart;
      const progress = Math.min(1, elapsed / CAM_TRANS_DUR);
      const eased    = 1 - Math.pow(1 - progress, 3);
      camera.position.lerpVectors(CAM_START, CAM_END, eased);
      const lookNow = new THREE.Vector3().lerpVectors(CAM_LOOK_START, controls.target, eased);
      camera.lookAt(lookNow);
      const edgeP = Math.min(1, Math.max(0, (progress - 0.1) / 0.7));
      edgeMeshes.forEach(m => { m.material.opacity = m.userData.targetOpacity * edgeP; });
      pMat.opacity = 0.8 * Math.min(1, Math.max(0, (progress - 0.2) / 0.6));
      // Bokeh : focus suit la distance + aperture monte progressivement
      const _focusDist = camera.position.distanceTo(CAM_LOOK_START);
      bokehPass.uniforms['focus'].value += (_focusDist - bokehPass.uniforms['focus'].value) * 0.08;
      bokehPass.uniforms['aperture'].value = 0.0003 + eased * 0.0012;
      if (progress >= 1) {
        camTransition = false;
        nodeMeshes.forEach(m => {
          if (m !== activeNodeMesh) m.material.color.set(m.userData.niveau === 2 ? COLOR_N2 : COLOR_DEFAULT);
          m.material.opacity = 1;
        });
        edgeMeshes.forEach(m => { m.material.opacity = m.userData.targetOpacity; });
        pMat.opacity = 0.8;
        scene.fog = new THREE.FogExp2(_isDark ? 0x000000 : 0xffffff, 0.0093);
        controls.enabled = true; controls.autoRotate = true; controls.update();
      }
    } else {
      // Smooth orbit target
      controls.target.lerp(lerpTarget, 0.05);
      controls.update();
    }
    ringMeshes.forEach(r => r.lookAt(camera.position));

    // Pulse uniquement sur le noeud actif (hors intro)
    nodeMeshes.forEach((m, i) => {
        if (m === activeNodeMesh) {
          const s = 1 + 0.1 * Math.sin(t * 2 + i * 0.9);
          m.scale.setScalar(s);
        } else {
          m.scale.setScalar(1);
      }
    });

    // Float cards idle animation
    floatingCards.forEach(obj => {
      obj.position.y = obj.userData.baseY + Math.sin(t * 0.7 + obj.userData.phase) * obj.userData.ampY;
      obj.position.x = obj.userData.baseX + Math.sin(t * 0.4 + obj.userData.phase + 2) * obj.userData.ampY * 0.4;
    });
    // Sync hit planes avec l'animation flottante
    cardHitPlanes.forEach(plane => {
      const ref = plane.userData.floatRef;
      if (ref) { plane.position.x = ref.position.x; plane.position.y = ref.position.y; }
    });

    if (_frame % 2 === 0) updateLabels();
    if (_frame % 6 === 0) updateNavDots();
    composer.render();
    cssRenderer.render(cssScene, camera);
  }

  hideLoadingScreen(() => {
    camTransition = true;
    camTransitionStart = clock.getElapsedTime();
    setTimeout(() => {
      const titleEl    = document.getElementById('title');
      const hintEl     = document.getElementById('hint');
      const timelineEl = document.getElementById('timeline');
      titleEl.style.transition    = 'opacity 1.2s ease';
      hintEl.style.transition     = 'opacity 1.2s ease 0.3s';
      timelineEl.style.transition = 'opacity 1.2s ease 0.5s';
      titleEl.style.opacity = '1'; hintEl.style.opacity = '1'; timelineEl.style.opacity = '1';
    }, 500);
  });

  // ─────────────────────────────────────────────────────────────────
  // RESIZE
  // ─────────────────────────────────────────────────────────────────

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    cssRenderer.setSize(window.innerWidth, window.innerHeight);
  });

  </script>
</body>
</html>
